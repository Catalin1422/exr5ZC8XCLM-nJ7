<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        /* Make the background black and hide scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* The Video Styling */
        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Makes it look like TikTok full-screen */
            display: none; /* Hidden until user taps the button */
        }

        /* The Play Button Styling */
        #play-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5));
            cursor: pointer;
            z-index: 10;
        }

        #play-button {
            width: 80px;
            height: 80px;
            background: #fe2c55; /* TikTok Red */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(254, 44, 85, 0.5);
        }

        #play-icon {
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid white;
            margin-left: 5px;
        }

        #play-text {
            color: white;
            margin-top: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="play-overlay" onclick="startVideo()">
        <div id="play-button">
            <div id="play-icon"></div>
        </div>
        <div id="play-text">Tap to Play</div>
    </div>

    <video id="myVideo" playsinline controls>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        function startVideo() {
            const video = document.getElementById('myVideo');
            const overlay = document.getElementById('play-overlay');

            // 1. Hide the overlay
            overlay.style.display = 'none';

            // 2. Show the video
            video.style.display = 'block';

            // 3. Play the video (Now with sound!)
            video.play();
        }
    </script>

</body>
</html>
