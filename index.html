<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Video</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }
        video { 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; /* This makes it look like a full-screen TikTok */
        }
    </style>
</head>
<body>

    <video playsinline controls autoplay >
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

</body>
</html>
